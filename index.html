<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TURTLE FIGHTER — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
  <div id="ui-overlay">
    <div id="hud-top">
      <div id="player-hud">
        <span class="hud-name">TURTLE</span>
        <div class="health-bar-wrap">
          <div class="health-bar" id="player-health-bar"></div>
        </div>
      </div>
      <div id="round-info">
        <div id="round-label">RND 1</div>
        <div id="timer">99</div>
      </div>
      <div id="cpu-hud">
        <div class="health-bar-wrap cpu">
          <div class="health-bar cpu" id="cpu-health-bar"></div>
        </div>
        <span class="hud-name">CPU</span>
      </div>
    </div>

    <div id="state-badge" class="hidden"></div>

    <div id="controls-bar">
      <span><kbd>J</kbd> Punch</span>
      <span><kbd>K</kbd> Kick</span>
      <span><kbd>L</kbd> Block</span>
      <span><kbd>SPACE</kbd> Jump</span>
      <span><kbd>S</kbd>+<kbd>D</kbd>+<kbd>J</kbd> Special</span>
      <span><kbd>← →</kbd> Move</span>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script src="input.js"></script>
  <script src="player.js"></script>
  <script src="game.js"></script>
</body>
</html>
