<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>METZ FIGHTER</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
  <div id="ui-overlay">
    <div id="hud-top">
      <div id="player-hud">
        <span class="hud-name">P1</span>
        <div class="health-bar-wrap">
          <div class="health-bar" id="player-health-bar"></div>
        </div>
        <div id="special-indicator" title="ESPECIAL DISPONÍVEL — ↓+J">
          <span class="special-icon">⚡</span>
          <span class="special-label">ESPECIAL</span>
        </div>
      </div>
      <div id="round-info">
        <div id="round-label">RND 1</div>
        <div id="timer">99</div>
      </div>
      <div id="cpu-hud">
        <div class="health-bar-wrap cpu">
          <div class="health-bar cpu" id="cpu-health-bar"></div>
        </div>
        <span class="hud-name">CPU</span>
      </div>
    </div>

    <div id="state-badge" class="hidden"></div>

    <!-- Desktop controls hint -->
    <div id="controls-bar">
      <span><kbd>J</kbd> Light</span>
      <span><kbd>K</kbd> Heavy/Sig</span>
      <span><kbd>L</kbd> Dodge</span>
      <span><kbd>SPACE</kbd> Pular (x3 no ar)</span>
      <span><kbd>↓</kbd> Fast Fall</span>
      <span><kbd>→→</kbd> Dash</span>
      <span><kbd>↓+J</kbd> Especial</span>
      <span><kbd>Spot Dodge + J/K</kbd> Gravity Cancel</span>
    </div>

    <!-- Mobile controls -->
    <div id="mobile-controls">
      <!-- D-pad esquerdo: 4 direções -->
      <div id="dpad">
        <div id="dpad-row-top">
          <button class="dpad-btn" id="btn-up"   data-key="arrowup">▲</button>
        </div>
        <div id="dpad-row-mid">
          <button class="dpad-btn" id="btn-left"  data-key="arrowleft">◀</button>
          <div class="dpad-center"></div>
          <button class="dpad-btn" id="btn-right" data-key="arrowright">▶</button>
        </div>
        <div id="dpad-row-bot">
          <button class="dpad-btn" id="btn-down"  data-key="arrowdown">▼</button>
        </div>
      </div>

      <!-- Botões de ação direita -->
      <div id="action-btns">
        <div class="action-row">
          <button class="action-btn btn-jump"    data-key=" ">PULAR</button>
          <button class="action-btn btn-special" data-special="true">ESPECIAL</button>
        </div>
        <div class="action-row">
          <button class="action-btn btn-punch" data-key="j">LEVE</button>
          <button class="action-btn btn-kick"  data-key="k">FORTE</button>
          <button class="action-btn btn-block" data-key="l">DODGE</button>
        </div>
      </div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script src="intro.js"></script>
  <script src="charselect.js"></script>
  <script src="input.js"></script>
  <script src="player.js"></script>
  <script src="game.js"></script>
  <script src="mobile.js"></script>
</body>
</html>
