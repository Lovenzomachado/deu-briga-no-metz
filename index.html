<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>METZ FIGHTER</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
  <div id="ui-overlay">
    <div id="hud-top">
      <div id="player-hud">
        <span class="hud-name">HENRIQUE</span>
        <div class="health-bar-wrap">
          <div class="health-bar" id="player-health-bar"></div>
        </div>
        <div id="special-indicator" title="ESPECIAL DISPONÍVEL — S+D+J">
          <span class="special-icon">⚡</span>
          <span class="special-label">ESPECIAL</span>
        </div>
      </div>
      <div id="round-info">
        <div id="round-label">RND 1</div>
        <div id="timer">99</div>
      </div>
      <div id="cpu-hud">
        <div class="health-bar-wrap cpu">
          <div class="health-bar cpu" id="cpu-health-bar"></div>
        </div>
        <span class="hud-name">CPU</span>
      </div>
    </div>

    <div id="state-badge" class="hidden"></div>

    <!-- Desktop: barra de controles com teclado -->
    <div id="controls-bar">
      <span><kbd>J</kbd> Soco</span>
      <span><kbd>K</kbd> Chute</span>
      <span><kbd>L</kbd> Bloquear</span>
      <span><kbd>SPACE</kbd> Pular</span>
      <span><kbd>S</kbd>+<kbd>J</kbd> Especial</span>
      <span><kbd>&#x2190; &#x2192;</kbd> Mover</span>
    </div>

    <!-- Mobile: botoes virtuais -->
    <div id="mobile-controls">
      <div id="dpad">
        <button class="dpad-btn" id="btn-left"  data-key="arrowleft">&#x25C4;</button>
        <button class="dpad-btn" id="btn-right" data-key="arrowright">&#x25BA;</button>
      </div>
      <div id="action-btns">
        <div class="action-row">
          <button class="action-btn btn-jump"    data-key=" ">PULAR</button>
          <button class="action-btn btn-special" data-special="true">ESPECIAL</button>
        </div>
        <div class="action-row">
          <button class="action-btn btn-punch" data-key="j">SOCO</button>
          <button class="action-btn btn-kick"  data-key="k">CHUTE</button>
          <button class="action-btn btn-block" data-key="l">BLOCK</button>
        </div>
      </div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script src="charselect.js"></script>
  <script src="input.js"></script>
  <script src="player.js"></script>
  <script src="game.js"></script>
  <script src="mobile.js"></script>
</body>
</html>
